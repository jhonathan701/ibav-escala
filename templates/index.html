<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IBAV Itaim Paulista</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:15px;
    color:white;
}

input{
    border-radius:10px !important;
}

.btn-app{
    border-radius:10px;
}

</style>

</head>

<body class="container py-4">

<h2 class="text-center mb-4">
<i class="fa-solid fa-church"></i>
IBAV Itaim Paulista
</h2>

<!-- FORM -->
<div class="card p-3 mb-4">

<form method="POST">

<input
class="form-control mb-2"
name="data"
placeholder="📅 Data"
required>

<input
class="form-control mb-2"
name="lider"
placeholder="👤 Líder"
required>

<input
class="form-control mb-2"
name="funcao"
placeholder="🎤 Função"
required>

<button class="btn btn-success w-100 btn-app">
Adicionar
</button>

</form>

</div>

<!-- LISTA -->

{% if escala %}

{% for pessoa in escala %}

<div class="card p-3 mb-3">

<h5>
📅 {{ pessoa.data }}
</h5>

<p>
👤 {{ pessoa.lider }}
</p>

<p>
🎤 {{ pessoa.funcao }}
</p>

<div class="d-flex gap-2">

<!-- REMOVER -->
<form action="/remover" method="POST">

<input
type="hidden"
name="id"
value="{{ pessoa.id }}">

<button class="btn btn-danger btn-sm">
Excluir
</button>

</form>

<!-- EDITAR -->
<button
class="btn btn-warning btn-sm"
onclick="abrirModal(
'{{ pessoa.id }}',
'{{ pessoa.lider }}',
'{{ pessoa.funcao }}'
)">
Editar
</button>

</div>

</div>

{% endfor %}

{% else %}

<div class="card p-3 text-center">
Nenhuma escala cadastrada
</div>

{% endif %}

<!-- MODAL -->
<div class="modal fade" id="modalEditar">

<div class="modal-dialog">

<form
method="POST"
action="/editar"
class="modal-content bg-dark text-white">

<div class="modal-header">
<h5>Editar Escala</h5>
</div>

<div class="modal-body">

<input type="hidden" name="id" id="id">

<input
class="form-control mb-2"
name="lider"
id="lider">

<input
class="form-control"
name="funcao"
id="funcao">

</div>

<div class="modal-footer">

<button class="btn btn-success w-100">
Salvar
</button>

</div>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

function abrirModal(id, lider, funcao){

document.getElementById("id").value = id;
document.getElementById("lider").value = lider;
document.getElementById("funcao").value = funcao;

var modal = new bootstrap.Modal(
document.getElementById('modalEditar')
);

modal.show();

}

</script>

</body>
</html>
