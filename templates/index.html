<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IBAV Escala</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:15px;
}

</style>

</head>

<body class="container py-4">

<h1 class="mb-4">
    📅 Escala IBAV
</h1>


<!-- 🔍 BUSCAR -->
<form method="GET" class="mb-4">

    <div class="input-group">

        <input type="text"
               name="buscar"
               class="form-control"
               placeholder="Buscar por data...">

        <button class="btn btn-primary">
            Buscar
        </button>

    </div>

</form>


{% if admin %}

<!-- ➕ FORM -->
<form method="POST" class="card p-3 mb-4">

    <input class="form-control mb-2"
           name="data"
           placeholder="Data"
           required>

    <input class="form-control mb-2"
           name="lider"
           placeholder="Líder"
           required>

    <input class="form-control mb-2"
           name="funcao"
           placeholder="Função"
           required>

    <button class="btn btn-success">
        Adicionar
    </button>

</form>

<a href="/logout" class="btn btn-danger mb-4">
    Sair
</a>

{% else %}

<!-- 🔐 LOGIN -->
<form action="/login" method="POST" class="card p-3 mb-4">

    <input type="password"
           name="senha"
           class="form-control mb-2"
           placeholder="Senha">

    <button class="btn btn-primary">
        Entrar
    </button>

</form>

{% endif %}


<!-- 📋 LISTA -->
{% for item in escala %}

<div class="card p-3 mb-3">

    <h4>
        📅 {{ item.data }}
    </h4>

    <p>
        👤 {{ item.lider }}
    </p>

    <p>
        🎤 {{ item.funcao }}
    </p>

</div>

{% endfor %}

</body>
</html>
