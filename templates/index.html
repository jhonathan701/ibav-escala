<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IBAV Itaim Paulista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    border-radius:15px;
    color:white;
}

.btn-app{
    border-radius:10px;
}

input{
    border-radius:10px !important;
}

</style>
</head>

<body class="container py-4">

<h2 class="text-center mb-4">
<i class="fa-solid fa-church"></i>
IBAV Itaim Paulista
</h2>

<!-- BUSCA -->
<form method="GET" class="mb-3">

<div class="input-group">

<input
type="text"
name="busca"
class="form-control"
placeholder="🔎 Buscar por data ou nome">

<button class="btn btn-primary">
<i class="fa-solid fa-search"></i>
</button>

</div>

</form>

<!-- FORM -->
<div class="card p-3 mb-4">

<form method="POST">

<input
class="form-control mb-2"
name="data"
placeholder="📅 Data"
required>

<input
class="form-control mb-2"
name="lider"
placeholder="👤 Líder"
required>

<input
class="form-control mb-2"
name="funcao"
placeholder="🎤 Função"
required>

<button class="btn btn-success w-100 btn-app">
<i class="fa-solid fa-plus"></i>
Adicionar
</button>

</form>

</div>

<!-- LISTA -->
{% for pessoa in escala %}

<div class="card p-3 mb-3">

<h5>
<i class="fa-solid fa-calendar-days"></i>
{{ pessoa.data }}
</h5>

<p>
<i class="fa-solid fa-user"></i>
{{ pessoa.lider }}
</p>

<p>
<i class="fa-solid fa-microphone"></i>
{{ pessoa.funcao }}
</p>

<div class="d-flex gap-2">

<!-- EDITAR -->
<button
class="btn btn-warning btn-sm"
data-bs-toggle="modal"
data-bs-target="#modal{{ pessoa.id }}">
<i class="fa-solid fa-pen"></i>
</button>

<!-- APAGAR -->
<a
href="/remover/{{ pessoa.id }}"
class="btn btn-danger btn-sm">
<i class="fa-solid fa-trash"></i>
</a>

</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modal{{ pessoa.id }}">

<div class="modal-dialog">

<div class="modal-content bg-dark text-white">

<form method="POST" action="/editar/{{ pessoa.id }}">

<div class="modal-header">
<h5>Editar Escala</h5>
</div>

<div class="modal-body">

<input
class="form-control mb-2"
name="lider"
value="{{ pessoa.lider }}">

<input
class="form-control"
name="funcao"
value="{{ pessoa.funcao }}">

</div>

<div class="modal-footer">

<button class="btn btn-success w-100">
Salvar
</button>

</div>

</form>

</div>

</div>

</div>

{% endfor %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
