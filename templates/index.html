<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IBAV Itaim Paulista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Ícones -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#0f172a;
    color:white;
}

.card{
    background:#1e293b;
    color:white;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

.btn-app{
    border-radius:10px;
}

input{
    border-radius:10px !important;
}

</style>
</head>

<body class="container py-4">

<h2 class="text-center mb-4">
    <i class="fa-solid fa-church"></i>
    IBAV Itaim Paulista
</h2>

<!-- BUSCA -->
<div class="mb-4">

<input
type="text"
id="buscar"
class="form-control"
placeholder="🔍 Buscar por data ou nome..."
onkeyup="filtrarEscalas()">

</div>

<!-- FORM -->
<div class="card p-3 mb-4">

<form method="POST">

<input
class="form-control mb-2"
name="data"
placeholder="📅 Data"
required>

<input
class="form-control mb-2"
name="lider"
placeholder="👤 Líder"
required>

<input
class="form-control mb-2"
name="funcao"
placeholder="🎤 Função"
required>

<button class="btn btn-success w-100 btn-app">
<i class="fa-solid fa-plus"></i>
Adicionar
</button>

</form>
</div>

<!-- LISTA -->
{% for item in escala %}

<div class="card p-3 mb-3 escala-card">

<h5>
<i class="fa-solid fa-calendar-days"></i>
{{ item.data }}
</h5>

<div class="d-flex justify-content-between align-items-center">

<div>
<i class="fa-solid fa-user"></i>
{{ item.lider }}
-
<i class="fa-solid fa-microphone"></i>
{{ item.funcao }}
</div>

<div>

<!-- EXCLUIR -->
<form action="/remover/{{ item.id }}" method="POST" style="display:inline;">

<button class="btn btn-danger btn-sm btn-app">
<i class="fa-solid fa-trash"></i>
</button>

</form>

</div>

</div>

</div>

{% endfor %}

<script>

function filtrarEscalas(){

let input = document.getElementById("buscar").value.toLowerCase();

let cards = document.querySelectorAll(".escala-card");

cards.forEach(card => {

let texto = card.innerText.toLowerCase();

if(texto.includes(input)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

}

</script>

</body>
</html>
