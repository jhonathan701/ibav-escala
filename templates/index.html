<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>IBAV Itaim Paulista</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#0f172a; color:white; }

.card {
    background:#1e293b;
    border-radius:15px;
    margin-bottom:15px;
}

input, button {
    border-radius:10px !important;
}
</style>
</head>

<body class="container py-4">

<h2 class="text-center mb-4">📅 IBAV Itaim Paulista</h2>

<!-- LOGIN -->
{% if not admin %}
<div class="card p-3">
    <h5>Login Admin</h5>
    <form action="/login" method="POST">
        <input class="form-control mb-2" type="password" name="senha" placeholder="Senha">
        <button class="btn btn-primary w-100">Entrar</button>
    </form>
</div>
{% else %}
<a href="/logout" class="btn btn-danger mb-3">Sair</a>
{% endif %}

<!-- FORM -->
{% if admin %}
<div class="card p-3">
<form method="POST">
    <input class="form-control mb-2" name="data" placeholder="Data" required>
    <input class="form-control mb-2" name="lider" placeholder="Líder" required>
    <input class="form-control mb-2" name="funcao" placeholder="Função" required>

    <button class="btn btn-success w-100">Adicionar</button>
</form>
</div>
{% endif %}

<!-- BUSCAR -->
<div class="card p-3">
<form action="/buscar" method="POST">
    <input class="form-control mb-2" name="data" placeholder="Buscar por data">
    <button class="btn btn-info w-100">Buscar</button>
</form>
</div>

<!-- LISTA -->
<div class="card p-3">
<h5>Escalas</h5>

{% for pessoa in escala %}
<div class="mb-2 d-flex justify-content-between">
    <div>
        <b>{{ pessoa.data }}</b><br>
        {{ pessoa.lider }} - {{ pessoa.funcao }}
    </div>

    {% if admin %}
    <form action="/remover" method="POST">
        <input type="hidden" name="id" value="{{ pessoa.id }}">
        <button class="btn btn-danger">X</button>
    </form>
    {% endif %}
</div>
{% endfor %}

</div>

</body>
</html>
